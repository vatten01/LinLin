<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boeket bloemen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="page-stress">
    <div class="ambient ambient-three"></div>
    <div class="ambient ambient-two"></div>

    <header class="site-header">
      <a class="brand" href="index.html">Voor jou</a>
      <nav class="site-nav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="wensen.html">Wat we kunnen doen</a>
        <a class="nav-link" href="reminder.html">Quote</a>
        <a class="nav-link" href="stress.html">Stress uitlaten</a>
        <a class="nav-link active" href="bouquet.html">Boeket bloemen</a>
      </nav>
    </header>

    <main class="stress-layout">
      <section class="stress-copy reveal">
        <h1>Boeket bloemen</h1>
        <div class="bouquet-count">
          <button
            class="button button-secondary bouquet-step"
            id="decrease-flowers"
            type="button"
            aria-label="Minder bloemen"
          >
            -
          </button>
          <span class="stress-pill"
            >Aantal bloemen: <strong id="flower-count">0</strong></span
          >
          <button
            class="button button-secondary bouquet-step"
            id="increase-flowers"
            type="button"
            aria-label="Meer bloemen"
          >
            +
          </button>
        </div>
        <div class="stress-stats bouquet-tags" aria-label="Bloemen">
          <span class="stress-pill">Rozen</span>
          <span class="stress-pill">Tulpen</span>
        </div>
      </section>

      <section class="stress-stage reveal-delay">
        <div class="bouquet-wrap" aria-label="Boeket bloemen">
          <div class="bouquet-glow" aria-hidden="true"></div>
          <div class="bouquet-flowers" id="bouquet-flowers"></div>
          <div class="bouquet-paper bouquet-paper-left"></div>
          <div class="bouquet-paper bouquet-paper-right"></div>
          <div class="bouquet-ribbon"></div>
          <div class="bouquet-shadow" aria-hidden="true"></div>
        </div>
      </section>
    </main>

    <script src="bouquet.js"></script>
  </body>
</html>
